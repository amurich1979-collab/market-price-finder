services:
  - type: web
    name: market-price-finder
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APIFY_TOKEN
        sync: false
      - key: APIFY_ACTOR_ID
        value: isolovyev/ru-marketplaces-price-monitor
      - key: OZON_ACTOR_ID
        value: isolovyev/ru-marketplaces-price-monitor
      - key: WB_ACTOR_ID
        value: isolovyev/ru-marketplaces-price-monitor
      - key: YANDEX_ACTOR_ID
        sync: false
      - key: APIFY_MAX_PAGES
        value: "1"
      - key: APIFY_MAX_ITEMS
        value: "50"
      - key: APIFY_TIMEOUT_MS
        value: "35000"
      - key: OZON_TIMEOUT_MS
        value: "90000"
      - key: WB_TIMEOUT_MS
        value: "12000"
      - key: WB_ACTOR_TIMEOUT_MS
        value: "90000"
      - key: YANDEX_TIMEOUT_MS
        value: "15000"
